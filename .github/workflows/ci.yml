name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test:run

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm typecheck

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm build

      - name: Verify package sizes
        run: |
          echo "=== Package Size Audit ==="
          for pkg in core parser renderer layout; do
            esm_size=$(wc -c < packages/$pkg/dist/index.js | tr -d ' ')
            cjs_size=$(wc -c < packages/$pkg/dist/index.cjs | tr -d ' ')
            esm_gzip=$(gzip -c packages/$pkg/dist/index.js | wc -c | tr -d ' ')
            echo "@pre-markdown/$pkg: ESM ${esm_size}B (gzip ${esm_gzip}B), CJS ${cjs_size}B"
          done

          # Check total gzip < 30KB
          total_gzip=0
          for pkg in core parser renderer layout; do
            gz=$(gzip -c packages/$pkg/dist/index.js | wc -c | tr -d ' ')
            total_gzip=$((total_gzip + gz))
          done
          echo ""
          echo "Total ESM gzip: ${total_gzip} bytes"
          if [ "$total_gzip" -gt 30720 ]; then
            echo "❌ FAIL: Total gzip size exceeds 30KB budget!"
            exit 1
          else
            echo "✅ PASS: Total gzip size within 30KB budget"
          fi
