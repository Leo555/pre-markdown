<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Markdown 语法兼容性测试</title>
  <link rel="stylesheet" href="./style.css" />
  <style>
    .test-grid { display: grid; grid-template-columns: 1fr; gap: 16px; margin-top: 20px; }
    .test-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
    .test-card-header { display: flex; justify-content: space-between; align-items: center; padding: 10px 16px; border-bottom: 1px solid var(--border); }
    .test-card-header h3 { font-size: 14px; font-weight: 600; margin: 0; }
    .test-card-body { display: grid; grid-template-columns: 200px 1fr 1fr 1fr 1fr 1fr 1fr 1fr; font-size: 12px; }
    .test-cell { padding: 6px 10px; border-bottom: 1px solid var(--border); border-right: 1px solid var(--border); font-family: var(--mono); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .test-cell:last-child { border-right: none; }
    .test-cell.header { font-weight: 700; color: var(--dim); text-transform: uppercase; font-size: 10px; letter-spacing: 0.5px; background: rgba(0,0,0,0.2); }
    .test-cell.syntax { color: var(--accent); font-weight: 500; }
    .pass { color: var(--green); }
    .fail { color: var(--red); }
    .partial { color: var(--yellow); }
    .na { color: var(--dim); }

    .summary-bar { display: flex; gap: 20px; margin: 16px 0; font-size: 13px; }
    .summary-bar .item { display: flex; align-items: center; gap: 6px; }
    .summary-bar .dot { width: 10px; height: 10px; border-radius: 50%; }
    .dot.green { background: var(--green); }
    .dot.red { background: var(--red); }
    .dot.yellow { background: var(--yellow); }

    .score-bar { display: flex; gap: 16px; margin-top: 16px; flex-wrap: wrap; }
    .score-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 14px 20px; text-align: center; min-width: 120px; }
    .score-card .name { font-size: 12px; color: var(--dim); margin-bottom: 4px; }
    .score-card .score { font-size: 24px; font-weight: 800; font-family: var(--mono); }
  </style>
</head>
<body>

<h1><span>Markdown</span> 语法兼容性测试</h1>
<p class="subtitle">对比 7 款引擎对各类 Markdown 语法的支持程度 — ✓ 支持 / ✗ 不支持 / ~ 部分支持</p>

<div class="controls">
  <button id="btn-run">开始测试</button>
  <button id="btn-clear" class="danger">清空</button>
  <span class="status" id="status"></span>
</div>

<div class="summary-bar">
  <div class="item"><div class="dot green"></div> 完全支持 (✓)</div>
  <div class="item"><div class="dot yellow"></div> 部分支持 (~)</div>
  <div class="item"><div class="dot red"></div> 不支持 (✗)</div>
</div>

<div class="score-bar" id="scores"></div>

<div id="results"></div>

<div class="section">
  <h2>测试日志</h2>
  <div id="log"></div>
</div>

<script type="module" src="./compat.ts"></script>
</body>
</html>
