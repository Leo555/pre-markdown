<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PreMarkdown — Demo</title>
  <!-- highlight.js for code block syntax highlighting -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <style>
    :root {
      --bg: #0f1117;
      --bg-card: #1a1d27;
      --bg-input: #13151d;
      --border: #2a2d3a;
      --text: #e4e5e9;
      --text-dim: #8b8d97;
      --accent: #6c5ce7;
      --accent-soft: rgba(108, 92, 231, 0.15);
      --green: #00cec9;
      --radius: 10px;
      --font-mono: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', 'SF Mono', monospace;
      --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--font-sans);
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ===== Header ===== */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--bg-card);
      flex-shrink: 0;
    }
    header .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 700;
      font-size: 18px;
      letter-spacing: -0.5px;
    }
    header .logo span { color: var(--accent); }
    header .badge {
      font-size: 11px;
      background: var(--accent-soft);
      color: var(--accent);
      padding: 3px 8px;
      border-radius: 20px;
      font-weight: 600;
    }
    header .stats {
      display: flex;
      gap: 16px;
      font-size: 12px;
      color: var(--text-dim);
    }
    header .stats b { color: var(--green); font-weight: 600; }

    /* ===== Main ===== */
    main {
      flex: 1;
      display: flex;
      overflow: hidden;
      min-height: 0;
    }

    /* ===== Editor Pane ===== */
    .pane {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-height: 0;
    }
    .pane-header {
      padding: 8px 16px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-dim);
      border-bottom: 1px solid var(--border);
      background: var(--bg-card);
      flex-shrink: 0;
    }
    .divider {
      width: 5px;
      background: var(--border);
      flex-shrink: 0;
      cursor: col-resize;
      transition: background 0.15s;
    }
    .divider:hover, .divider.dragging {
      background: var(--accent);
    }

    textarea#editor {
      flex: 1;
      resize: none;
      border: none;
      outline: none;
      padding: 20px 20px 20px 0;
      font-family: var(--font-mono);
      font-size: 14px;
      line-height: 1.7;
      background: transparent;
      color: transparent;
      caret-color: var(--text);
      tab-size: 2;
      position: relative;
      z-index: 2;
    }
    textarea#editor::placeholder { color: var(--text-dim); }
    textarea#editor::selection { background: rgba(108, 92, 231, 0.35); }

    .editor-wrapper {
      flex: 1;
      display: flex;
      overflow: hidden;
      background: var(--bg-input);
    }

    /* Syntax highlight backdrop */
    .editor-area {
      flex: 1;
      position: relative;
      overflow: hidden;
    }
    .editor-area textarea#editor {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }
    #highlight-backdrop {
      padding: 20px 20px 20px 0;
      font-family: var(--font-mono);
      font-size: 14px;
      line-height: 1.7;
      tab-size: 2;
      color: var(--text);
      white-space: pre-wrap;
      word-wrap: break-word;
      overflow-y: auto;
      overflow-x: hidden;
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
      margin: 0;
      border: none;
    }
    #highlight-backdrop code { font-family: inherit; font-size: inherit; padding: 0; background: none; }

    /* Markdown syntax highlight tokens */
    .hl-heading { color: #f1c40f; font-weight: 700; }
    .hl-heading-marker { color: #e67e22; font-weight: 700; }
    .hl-bold { color: #fff; font-weight: 700; }
    .hl-italic { color: #c8c9ce; font-style: italic; }
    .hl-bold-italic { color: #fff; font-weight: 700; font-style: italic; }
    .hl-strike { color: var(--text-dim); text-decoration: line-through; }
    .hl-code { color: #a29bfe; background: rgba(108, 92, 231, 0.1); border-radius: 3px; }
    .hl-code-fence { color: #00cec9; }
    .hl-code-lang { color: #55efc4; }
    .hl-link-text { color: #74b9ff; }
    .hl-link-url { color: #636e72; }
    .hl-link-bracket { color: #636e72; }
    .hl-image-marker { color: #fd79a8; }
    .hl-list-marker { color: #e17055; font-weight: 600; }
    .hl-blockquote-marker { color: #6c5ce7; font-weight: 600; }
    .hl-hr { color: #636e72; }
    .hl-html { color: #e17055; }
    .hl-escape { color: #fdcb6e; }
    .hl-table-border { color: #636e72; }
    .hl-math { color: #a29bfe; }
    .hl-highlight { color: #ffeaa7; background: rgba(255, 220, 50, 0.1); }
    .hl-frontmatter { color: #636e72; font-style: italic; }
    .hl-container { color: #00cec9; font-weight: 600; }
    .hl-task-check { color: #00b894; font-weight: 600; }
    .hl-footnote { color: #a29bfe; }
    .line-numbers {
      padding: 20px 8px 20px 12px;
      font-family: var(--font-mono);
      font-size: 14px;
      line-height: 1.7;
      color: var(--text-dim);
      text-align: right;
      user-select: none;
      overflow: hidden;
      flex-shrink: 0;
      min-width: 36px;
      border-right: 1px solid var(--border);
      background: rgba(15, 17, 23, 0.5);
    }
    .line-numbers div {
      box-sizing: border-box;
      white-space: nowrap;
      overflow: hidden;
    }
    .line-numbers .active-line { color: var(--accent); font-weight: 600; }

    .toolbar {
      display: flex;
      gap: 2px;
      padding: 4px 8px;
      border-bottom: 1px solid var(--border);
      background: var(--bg-card);
      flex-shrink: 0;
      flex-wrap: wrap;
    }
    .toolbar button {
      background: none;
      border: 1px solid transparent;
      color: var(--text-dim);
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 13px;
      font-family: var(--font-mono);
      line-height: 1;
      transition: all 0.15s;
    }
    .toolbar button:hover {
      background: var(--accent-soft);
      color: var(--accent);
      border-color: var(--accent);
    }
    .toolbar .sep {
      width: 1px;
      background: var(--border);
      margin: 2px 4px;
    }

    /* ===== Preview Pane ===== */
    #preview {
      flex: 1;
      overflow-y: auto;
      padding: 24px 32px;
      background: var(--bg);
      font-size: 15px;
      line-height: 1.75;
      min-height: 0;
    }

    /* ===== Markdown Rendered Styles ===== */
    #preview h1 { font-size: 2em; margin: 0.8em 0 0.4em; font-weight: 800; letter-spacing: -0.5px; border-bottom: 2px solid var(--border); padding-bottom: 0.3em; }
    #preview h2 { font-size: 1.5em; margin: 0.7em 0 0.35em; font-weight: 700; color: var(--accent); }
    #preview h3 { font-size: 1.25em; margin: 0.6em 0 0.3em; font-weight: 600; }
    #preview h4, #preview h5, #preview h6 { margin: 0.5em 0 0.25em; font-weight: 600; }
    #preview p { margin: 0.6em 0; }
    #preview a { color: var(--accent); text-decoration: none; }
    #preview a:hover { text-decoration: underline; }

    #preview strong { font-weight: 700; color: #fff; }
    #preview em { font-style: italic; color: #c8c9ce; }
    #preview del { color: var(--text-dim); }
    #preview mark, #preview .highlight { background: rgba(255, 220, 50, 0.2); color: #ffe066; padding: 1px 4px; border-radius: 3px; }

    #preview code {
      font-family: var(--font-mono);
      font-size: 0.88em;
      background: rgba(108, 92, 231, 0.12);
      color: #a29bfe;
      padding: 2px 6px;
      border-radius: 4px;
    }
    #preview pre {
      background: #13151d;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 20px;
      overflow-x: auto;
      margin: 0.8em 0;
    }
    #preview pre code {
      background: none;
      padding: 0;
      color: var(--text);
      font-size: 13px;
    }
    /* highlight.js overrides for dark theme */
    #preview pre code.hljs {
      background: none !important;
      padding: 0 !important;
    }

    #preview blockquote {
      border-left: 4px solid var(--accent);
      margin: 0.8em 0;
      padding: 8px 16px;
      background: var(--accent-soft);
      border-radius: 0 var(--radius) var(--radius) 0;
      color: #c8c9ce;
    }

    #preview ul, #preview ol { padding-left: 1.8em; margin: 0.5em 0; }
    #preview li { margin: 0.25em 0; }
    #preview li input[type="checkbox"] { margin-right: 6px; }

    #preview table { border-collapse: collapse; width: 100%; margin: 0.8em 0; }
    #preview th, #preview td { border: 1px solid var(--border); padding: 8px 12px; text-align: left; }
    #preview th { background: var(--bg-card); font-weight: 600; }
    #preview tr:nth-child(even) { background: rgba(255,255,255,0.02); }

    #preview hr { border: none; border-top: 1px solid var(--border); margin: 1.5em 0; }

    #preview img { max-width: 100%; border-radius: var(--radius); }

    #preview sup { font-size: 0.75em; vertical-align: super; }
    #preview sub { font-size: 0.75em; vertical-align: sub; }

    #preview .container { border-radius: var(--radius); padding: 12px 16px; margin: 0.8em 0; border-left: 4px solid; }
    #preview .container-info { border-color: #0984e3; background: rgba(9,132,227,0.1); }
    #preview .container-warning { border-color: #fdcb6e; background: rgba(253,203,110,0.1); }
    #preview .container-danger { border-color: #d63031; background: rgba(214,48,49,0.1); }
    #preview .container-success { border-color: #00b894; background: rgba(0,184,148,0.1); }
    #preview .container-primary { border-color: var(--accent); background: var(--accent-soft); }

    #preview details { margin: 0.8em 0; border: 1px solid var(--border); border-radius: var(--radius); }
    #preview details summary { padding: 10px 14px; cursor: pointer; font-weight: 600; background: var(--bg-card); border-radius: var(--radius); }
    #preview details[open] summary { border-radius: var(--radius) var(--radius) 0 0; border-bottom: 1px solid var(--border); }
    #preview details > :not(summary) { padding: 0 14px; }

    #preview .math-block { text-align: center; padding: 12px; font-family: var(--font-mono); color: var(--accent); }

    /* ===== Search & Replace Panel ===== */
    .search-panel {
      display: none;
      position: absolute;
      top: 0;
      right: 16px;
      z-index: 100;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-top: none;
      border-radius: 0 0 var(--radius) var(--radius);
      padding: 10px 12px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.3);
      min-width: 320px;
    }
    .search-panel.visible { display: flex; flex-direction: column; gap: 6px; }
    .search-row {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .search-row input {
      flex: 1;
      background: var(--bg-input);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 5px 8px;
      border-radius: 4px;
      font-family: var(--font-mono);
      font-size: 13px;
      outline: none;
    }
    .search-row input:focus { border-color: var(--accent); }
    .search-row button {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-dim);
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 12px;
      font-family: var(--font-mono);
      transition: all 0.15s;
      white-space: nowrap;
    }
    .search-row button:hover { background: var(--accent-soft); color: var(--accent); border-color: var(--accent); }
    .search-row button.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    .search-info {
      font-size: 11px;
      color: var(--text-dim);
      min-width: 60px;
      text-align: center;
    }
    .search-close {
      background: none !important;
      border: none !important;
      color: var(--text-dim) !important;
      cursor: pointer;
      font-size: 16px;
      padding: 2px 6px !important;
      line-height: 1;
    }
    .search-close:hover { color: var(--text) !important; }

    /* Search highlight in backdrop */
    .hl-search-match { background: rgba(255, 200, 50, 0.35); border-radius: 2px; }
    .hl-search-current { background: rgba(255, 150, 0, 0.6); border-radius: 2px; }

    /* ===== Minimap ===== */
    .minimap {
      width: 80px;
      flex-shrink: 0;
      position: relative;
      background: rgba(15, 17, 23, 0.6);
      border-left: 1px solid var(--border);
      overflow: hidden;
      cursor: pointer;
      user-select: none;
    }
    .minimap canvas {
      width: 100%;
      height: 100%;
      display: block;
    }
    .minimap-viewport {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      background: rgba(108, 92, 231, 0.15);
      border: 1px solid rgba(108, 92, 231, 0.3);
      pointer-events: none;
      transition: top 0.05s linear;
    }

    /* ===== Outline Panel ===== */
    .outline-panel {
      display: none;
      width: 220px;
      flex-shrink: 0;
      background: var(--bg-card);
      border-left: 1px solid var(--border);
      overflow-y: auto;
      overflow-x: hidden;
      padding: 8px 0;
    }
    .outline-panel.visible { display: block; }
    .outline-item {
      display: block;
      padding: 4px 12px;
      font-size: 12px;
      color: var(--text-dim);
      text-decoration: none;
      cursor: pointer;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      border-left: 2px solid transparent;
      transition: all 0.1s;
    }
    .outline-item:hover {
      color: var(--text);
      background: rgba(108, 92, 231, 0.08);
    }
    .outline-item.active {
      color: var(--accent);
      border-left-color: var(--accent);
      background: rgba(108, 92, 231, 0.1);
    }
    .outline-item.h1 { padding-left: 12px; font-weight: 600; font-size: 13px; }
    .outline-item.h2 { padding-left: 24px; }
    .outline-item.h3 { padding-left: 36px; }
    .outline-item.h4 { padding-left: 48px; font-size: 11px; }
    .outline-item.h5 { padding-left: 60px; font-size: 11px; }
    .outline-item.h6 { padding-left: 72px; font-size: 11px; }
    .outline-header {
      padding: 4px 12px 8px;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-dim);
      border-bottom: 1px solid var(--border);
      margin-bottom: 4px;
    }

    /* ===== Word Count Bar ===== */
    .word-count-bar {
      display: flex;
      gap: 12px;
      font-size: 11px;
      color: var(--text-dim);
    }
    .word-count-bar span b { color: var(--green); font-weight: 600; }

    /* ===== Footer ===== */
    footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 24px;
      font-size: 11px;
      color: var(--text-dim);
      border-top: 1px solid var(--border);
      background: var(--bg-card);
      flex-shrink: 0;
    }
    footer .perf { color: var(--green); font-weight: 600; }

    /* ===== View Controls ===== */
    .view-controls {
      display: flex;
      gap: 4px;
    }
    .view-controls button {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-dim);
      cursor: pointer;
      padding: 4px 10px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      transition: all 0.15s;
    }
    .view-controls button:hover {
      background: var(--accent-soft);
      color: var(--accent);
      border-color: var(--accent);
    }
    .view-controls button.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    /* ===== View Modes ===== */
    main.view-edit #preview-pane,
    main.view-edit #divider { display: none; }
    main.view-edit #editor-pane { flex: 1 !important; }

    main.view-preview #editor-pane,
    main.view-preview #divider { display: none; }
    main.view-preview #preview-pane { flex: 1 !important; }

    /* ===== Responsive: mobile stacked ===== */
    @media (max-width: 768px) {
      main { flex-direction: column; }
      .divider { width: auto; height: 5px; cursor: row-resize; }
      .pane { flex: 1 !important; min-height: 0; }
      header { flex-wrap: wrap; gap: 8px; padding: 8px 12px; }
      header .stats { font-size: 11px; gap: 8px; }
      .view-controls button { padding: 3px 6px; font-size: 10px; }
      .toolbar { overflow-x: auto; flex-wrap: nowrap; }
      .toolbar button { flex-shrink: 0; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <span>Pre</span>Markdown
    <div class="badge">Demo v0.1</div>
  </div>
  <div class="stats">
    <span>Parse: <b id="stat-parse">--</b></span>
    <span>Render: <b id="stat-render">--</b></span>
    <span>AST Nodes: <b id="stat-nodes">--</b></span>
    <span>Lines: <b id="stat-lines">--</b></span>
  </div>
  <div class="view-controls" id="view-controls">
    <button data-view="split" class="active" title="分屏">Split</button>
    <button data-view="edit" title="全屏编辑">Edit</button>
    <button data-view="preview" title="全屏预览">Preview</button>
  </div>
</header>

<main>
  <div class="pane" id="editor-pane">
    <div class="pane-header">Markdown 编辑器</div>
    <div class="toolbar" id="toolbar">
      <button data-action="h1" title="标题 1">H1</button>
      <button data-action="h2" title="标题 2">H2</button>
      <button data-action="h3" title="标题 3">H3</button>
      <div class="sep"></div>
      <button data-action="bold" title="加粗 (Ctrl+B)"><b>B</b></button>
      <button data-action="italic" title="斜体 (Ctrl+I)"><i>I</i></button>
      <button data-action="strike" title="删除线 (Ctrl+D)"><s>S</s></button>
      <button data-action="code" title="代码 (Ctrl+`)">⟨⟩</button>
      <div class="sep"></div>
      <button data-action="link" title="链接 (Ctrl+K)">🔗</button>
      <button data-action="image" title="图片">🖼</button>
      <div class="sep"></div>
      <button data-action="ul" title="无序列表">• List</button>
      <button data-action="ol" title="有序列表">1. List</button>
      <button data-action="task" title="任务列表">☑ Task</button>
      <div class="sep"></div>
      <button data-action="quote" title="引用">&gt; Quote</button>
      <button data-action="codeblock" title="代码块">```</button>
      <button data-action="table" title="表格">⊞ Table</button>
      <button data-action="hr" title="分隔线">— HR</button>
    </div>
    <div class="editor-wrapper">
      <div class="line-numbers" id="line-numbers"></div>
      <div class="editor-area">
        <!-- Search & Replace Panel -->
        <div class="search-panel" id="search-panel">
          <div class="search-row">
            <input type="text" id="search-input" placeholder="搜索..." />
            <button id="search-regex" title="正则表达式">.*</button>
            <button id="search-case" title="区分大小写">Aa</button>
            <span class="search-info" id="search-info">0/0</span>
            <button id="search-prev" title="上一个 (Shift+Enter)">▲</button>
            <button id="search-next" title="下一个 (Enter)">▼</button>
            <button class="search-close" id="search-close" title="关闭 (Esc)">✕</button>
          </div>
          <div class="search-row" id="replace-row">
            <input type="text" id="replace-input" placeholder="替换..." />
            <button id="replace-one" title="替换当前">替换</button>
            <button id="replace-all" title="替换全部">全部</button>
          </div>
        </div>
        <pre id="highlight-backdrop"><code id="highlight-code"></code></pre>
        <textarea id="editor" spellcheck="false" placeholder="输入 Markdown 内容..."></textarea>
      </div>
      <div class="minimap" id="minimap">
        <canvas id="minimap-canvas"></canvas>
        <div class="minimap-viewport" id="minimap-viewport"></div>
      </div>
    </div>
  </div>
  <div class="divider" id="divider"></div>
  <div class="pane" id="preview-pane">
    <div class="pane-header">实时预览</div>
    <div id="preview"></div>
  </div>
  <div class="outline-panel" id="outline-panel">
    <div class="outline-header">大纲导航</div>
    <div id="outline-list"></div>
  </div>
</main>

<footer>
  <div class="word-count-bar" id="word-count-bar">
    <span>字数: <b id="stat-words">0</b></span>
    <span>字符: <b id="stat-chars">0</b></span>
    <span>阅读: <b id="stat-reading">0 min</b></span>
  </div>
